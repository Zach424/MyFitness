name: myfitness-local

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: myfitness
      POSTGRES_PASSWORD: myfitness_local
      POSTGRES_USER: myfitness
    ports:
      - '127.0.0.1:54329:5432'
    volumes:
      - myfitness_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myfitness -d myfitness']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  redis:
    image: redis:8.8.0-alpine
    command:
      [
        'redis-server',
        '--save',
        '',
        '--appendonly',
        'no',
        '--maxmemory',
        '64mb',
        '--maxmemory-policy',
        'noeviction',
      ]
    ports:
      - '127.0.0.1:63799:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 3s

  object-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: myfitness-minio
      MINIO_ROOT_PASSWORD: myfitness-minio-secret-2026-local
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - myfitness_object_storage_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  ai:
    build:
      context: ../../services/ai
    environment:
      AI_PROVIDER: fixture
      AI_SERVICE_TOKEN: myfitness-ai-local
    ports:
      - '127.0.0.1:8001:8001'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

volumes:
  myfitness_postgres_data:
  myfitness_object_storage_data:
