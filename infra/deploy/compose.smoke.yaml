name: myfitness-deploy-smoke

x-api-environment: &api-environment
  NODE_ENV: development
  API_HOST: 0.0.0.0
  API_PORT: 3100
  AUTH_ENABLED_PROVIDERS: dev
  DATABASE_URL: postgresql://myfitness:myfitness_smoke@postgres:5432/myfitness
  AI_SERVICE_URL: http://ai:8001
  AI_SERVICE_TOKEN: myfitness-ai-smoke
  PHOTO_UPLOAD_SIGNING_SECRET: smoke-photo-signing-secret-at-least-32
  OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
  OBJECT_STORAGE_BUCKET: myfitness-smoke-private
  OBJECT_STORAGE_REGION: us-east-1
  OBJECT_STORAGE_ACCESS_KEY_ID: myfitness-minio
  OBJECT_STORAGE_SECRET_ACCESS_KEY: myfitness-minio-smoke-secret
  OBJECT_STORAGE_FORCE_PATH_STYLE: 'true'
  OBJECT_STORAGE_AUTO_CREATE_BUCKET: 'true'
  OBJECT_STORAGE_SSE: none
  ERASURE_LEDGER_HASH_SECRET: smoke-erasure-ledger-hash-secret-at-least-32
  DATA_OPERATIONS_WORKER_ENABLED: 'false'
  REDIS_URL: redis://redis:6379
  RATE_LIMIT_HASH_SECRET: smoke-rate-limit-hash-secret-at-least-32
  OPERATIONS_TOKEN: smoke-operations-token-at-least-32-characters
  TRUST_PROXY_HOPS: 0
  CORS_ORIGINS: http://127.0.0.1:13101
  ADMIN_AUDIT_HASH_SECRET: smoke-admin-audit-hash-secret-at-least-32

x-api-build: &api-build
  context: ../..
  dockerfile: apps/api/Dockerfile
  args:
    BUILD_VERSION: smoke
    VCS_REF: local

services:
  postgres:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: myfitness
      POSTGRES_PASSWORD: myfitness_smoke
      POSTGRES_USER: myfitness
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myfitness -d myfitness']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    command:
      [
        'redis-server',
        '--save',
        '',
        '--appendonly',
        'no',
        '--maxmemory',
        '64mb',
        '--maxmemory-policy',
        'noeviction',
      ]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 3s

  object-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: myfitness-minio
      MINIO_ROOT_PASSWORD: myfitness-minio-smoke-secret
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - object-storage-data:/data

  ai:
    image: myfitness/ai:smoke
    build:
      context: ../../services/ai
      args:
        BUILD_VERSION: smoke
        VCS_REF: local
    environment:
      AI_PROVIDER: fixture
      AI_SERVICE_TOKEN: myfitness-ai-smoke
    ports:
      - '127.0.0.1:18001:8001'

  migrate:
    image: myfitness/api:smoke
    build: *api-build
    command: ['node', 'dist/database/migrate.js']
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    image: myfitness/api:smoke
    build: *api-build
    environment: *api-environment
    ports:
      - '127.0.0.1:13100:3100'
    depends_on:
      ai:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      object-storage:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    image: myfitness/admin:smoke
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
      args:
        BUILD_VERSION: smoke
        VCS_REF: local
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3101
      MYFITNESS_API_URL: http://api:3100/v1
      ADMIN_ENABLE_LOCAL_LOGIN: 'false'
      ADMIN_COOKIE_SECURE: 'true'
      ADMIN_OIDC_AUTHORIZATION_URL: https://identity.invalid/oauth2/authorize
      ADMIN_OIDC_TOKEN_URL: https://identity.invalid/oauth2/token
      ADMIN_OIDC_CLIENT_ID: smoke-client
      ADMIN_OIDC_CLIENT_SECRET: smoke-client-secret-never-used
      ADMIN_OIDC_REDIRECT_URI: https://admin.invalid/api/operator/oidc/callback
    ports:
      - '127.0.0.1:13101:3101'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  object-storage-data:
