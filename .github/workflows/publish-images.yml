name: Publish immutable release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: Select the same existing SemVer tag as the workflow ref
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  CLIENT_API_BASE_URL: ${{ vars.MYFITNESS_CLIENT_API_BASE_URL }}
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}

jobs:
  qualify:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.13.0
      - name: Validate immutable release inputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          QUALIFICATION_OUTPUT: ${{ runner.temp }}/release-qualification/release-qualification.json
          EXPECTED_REF: refs/tags/${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          node scripts/release-manifest.mjs qualify --version "${RELEASE_TAG}"
          node scripts/client-release.mjs qualify \
            --version "${RELEASE_TAG}" \
            --api-base-url "${CLIENT_API_BASE_URL}"
          if [[ "${GITHUB_REF}" != "${EXPECTED_REF}" ]]; then
            echo "Workflow ref ${GITHUB_REF} must equal ${EXPECTED_REF}." >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          node scripts/release-qualification.mjs verify \
            --repository "${GITHUB_REPOSITORY}" \
            --revision "${GITHUB_SHA}" \
            --version "${RELEASE_TAG}" \
            --tag-ref "${GITHUB_REF}" \
            --default-branch main \
            --ci-workflow ci.yml \
            --current-run-id "${GITHUB_RUN_ID}" \
            --current-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --output "${QUALIFICATION_OUTPUT}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-qualification
          path: ${{ runner.temp }}/release-qualification/release-qualification.json
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: qualify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/zach424/myfitness-api
          - service: admin
            context: .
            dockerfile: apps/admin/Dockerfile
            image: ghcr.io/zach424/myfitness-admin
          - service: ai
            context: services/ai
            dockerfile: services/ai/Dockerfile
            image: ghcr.io/zach424/myfitness-ai
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=raw,value=${{ env.RELEASE_TAG }}
      - id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ env.RELEASE_TAG }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Create immutable service fragment
        env:
          IMAGE: ${{ matrix.image }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          OUTPUT: ${{ runner.temp }}/release-fragment-${{ matrix.service }}.json
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ matrix.service }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REVISION: ${{ github.sha }}
        run: |
          node scripts/release-manifest.mjs fragment \
            --service "${SERVICE}" \
            --image "${IMAGE}" \
            --digest "${IMAGE_DIGEST}" \
            --repository "${SOURCE_REPOSITORY}" \
            --revision "${SOURCE_REVISION}" \
            --version "${RELEASE_TAG}" \
            --run-id "${RUN_ID}" \
            --run-attempt "${RUN_ATTEMPT}" \
            --output "${OUTPUT}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-fragment-${{ matrix.service }}
          path: ${{ runner.temp }}/release-fragment-${{ matrix.service }}.json
          if-no-files-found: error
          retention-days: 7

  package-clients:
    needs: qualify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      MYFITNESS_CLIENT_RELEASE_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
      MYFITNESS_CLIENT_SOURCE_REPOSITORY: ${{ github.repository }}
      MYFITNESS_CLIENT_SOURCE_REVISION: ${{ github.sha }}
      MYFITNESS_CLIENT_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
      MYFITNESS_CLIENT_WORKFLOW_RUN_ID: ${{ github.run_id }}
      TARO_APP_API_BASE_URL: ${{ vars.MYFITNESS_CLIENT_API_BASE_URL }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build and package H5 preview
        env:
          TARO_APP_AUTH_MODE: dev
        run: |
          set -euo pipefail
          pnpm build:h5
          node scripts/client-release.mjs package \
            --platform h5 \
            --build-root apps/client/dist-h5 \
            --artifact "${RUNNER_TEMP}/client-release/myfitness-client-h5.tar" \
            --fragment "${RUNNER_TEMP}/client-release/client-release-fragment-h5.json" \
            --repository "${GITHUB_REPOSITORY}" \
            --revision "${GITHUB_SHA}" \
            --version "${RELEASE_TAG}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
      - name: Build and package WeApp candidate
        env:
          TARO_APP_AUTH_MODE: wechat
        run: |
          set -euo pipefail
          pnpm build:weapp
          node scripts/client-release.mjs package \
            --platform weapp \
            --build-root apps/client/dist-weapp \
            --artifact "${RUNNER_TEMP}/client-release/myfitness-client-weapp.tar" \
            --fragment "${RUNNER_TEMP}/client-release/client-release-fragment-weapp.json" \
            --repository "${GITHUB_REPOSITORY}" \
            --revision "${GITHUB_SHA}" \
            --version "${RELEASE_TAG}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
      - name: Assemble immutable client release manifest
        run: |
          set -euo pipefail
          node scripts/client-release.mjs assemble \
            --input-dir "${RUNNER_TEMP}/client-release" \
            --published-at "$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" \
            --output "${RUNNER_TEMP}/client-release/client-release-manifest.json"
          (
            cd "${RUNNER_TEMP}/client-release"
            sha256sum client-release-manifest.json > client-release-manifest.sha256
          )
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-release-bundle
          path: |
            ${{ runner.temp }}/client-release/myfitness-client-h5.tar
            ${{ runner.temp }}/client-release/myfitness-client-weapp.tar
            ${{ runner.temp }}/client-release/client-release-manifest.json
            ${{ runner.temp }}/client-release/client-release-manifest.sha256
          if-no-files-found: error
          retention-days: 7

  release-record:
    needs: [publish, package-clients]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-qualification
          path: ${{ runner.temp }}/release-record
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-fragment-*
          path: ${{ runner.temp }}/release-fragments
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-release-bundle
          path: ${{ runner.temp }}/release-record
      - name: Assemble and verify release manifests
        env:
          INPUT_DIRECTORY: ${{ runner.temp }}/release-fragments
          OUTPUT_DIRECTORY: ${{ runner.temp }}/release-record
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_ID: ${{ github.run_id }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIRECTORY}"
          node scripts/release-qualification.mjs check \
            --file "${OUTPUT_DIRECTORY}/release-qualification.json" \
            --repository "${SOURCE_REPOSITORY}" \
            --revision "${SOURCE_REVISION}" \
            --version "${RELEASE_TAG}" \
            --tag-ref "${GITHUB_REF}" \
            --default-branch main \
            --ci-workflow ci.yml \
            --current-run-id "${RUN_ID}" \
            --current-run-attempt "${RUN_ATTEMPT}" \
            > "${RUNNER_TEMP}/release-qualification-verification.json"
          node scripts/release-manifest.mjs assemble \
            --input-dir "${INPUT_DIRECTORY}" \
            --published-at "$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" \
            --output "${OUTPUT_DIRECTORY}/release-manifest.json"
          node scripts/release-manifest.mjs verify \
            --file "${OUTPUT_DIRECTORY}/release-manifest.json" \
            --expected-repository "${SOURCE_REPOSITORY}" \
            --expected-revision "${SOURCE_REVISION}" \
            --expected-version "${RELEASE_TAG}" \
            > "${OUTPUT_DIRECTORY}/release-verification.json"
          (
            cd "${OUTPUT_DIRECTORY}"
            sha256sum --check client-release-manifest.sha256
          )
          node scripts/client-release.mjs verify \
            --file "${OUTPUT_DIRECTORY}/client-release-manifest.json" \
            --artifact-dir "${OUTPUT_DIRECTORY}" \
            --service-release "${OUTPUT_DIRECTORY}/release-manifest.json" \
            --expected-repository "${SOURCE_REPOSITORY}" \
            --expected-revision "${SOURCE_REVISION}" \
            --expected-version "${RELEASE_TAG}" \
            > "${OUTPUT_DIRECTORY}/client-release-verification.json"
          (
            cd "${OUTPUT_DIRECTORY}"
            sha256sum release-manifest.json > release-manifest.sha256
          )
          {
            echo '### Immutable release record'
            echo '```json'
            cat "${OUTPUT_DIRECTORY}/release-verification.json"
            echo '```'
            echo '### Immutable client release record'
            echo '```json'
            cat "${OUTPUT_DIRECTORY}/client-release-verification.json"
            echo '```'
            echo '### Release source qualification'
            echo '```json'
            cat "${RUNNER_TEMP}/release-qualification-verification.json"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: myfitness-release-${{ env.RELEASE_TAG }}
          path: |
            ${{ runner.temp }}/release-record/release-manifest.json
            ${{ runner.temp }}/release-record/release-manifest.sha256
            ${{ runner.temp }}/release-record/release-verification.json
            ${{ runner.temp }}/release-record/client-release-manifest.json
            ${{ runner.temp }}/release-record/client-release-manifest.sha256
            ${{ runner.temp }}/release-record/client-release-verification.json
            ${{ runner.temp }}/release-record/release-qualification.json
            ${{ runner.temp }}/release-record/myfitness-client-h5.tar
            ${{ runner.temp }}/release-record/myfitness-client-weapp.tar
          if-no-files-found: error
          retention-days: 90
      - name: Publish immutable GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RECORD_DIRECTORY: ${{ runner.temp }}/release-record
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; refusing to replace immutable assets." >&2
            exit 1
          fi
          release_flags=()
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "${RELEASE_TAG}" \
            "${RECORD_DIRECTORY}/release-manifest.json" \
            "${RECORD_DIRECTORY}/release-manifest.sha256" \
            "${RECORD_DIRECTORY}/release-verification.json" \
            "${RECORD_DIRECTORY}/client-release-manifest.json" \
            "${RECORD_DIRECTORY}/client-release-manifest.sha256" \
            "${RECORD_DIRECTORY}/client-release-verification.json" \
            "${RECORD_DIRECTORY}/release-qualification.json" \
            "${RECORD_DIRECTORY}/myfitness-client-h5.tar" \
            "${RECORD_DIRECTORY}/myfitness-client-weapp.tar" \
            --verify-tag \
            --title "MyFitness ${RELEASE_TAG}" \
            --generate-notes \
            "${release_flags[@]}"
