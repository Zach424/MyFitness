name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.13.0
          cache: pnpm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.12.11
          cache: pip
          cache-dependency-path: services/ai/requirements.lock
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --requirement services/ai/requirements.lock pytest==8.3.5
      - run: pnpm format:check
      - run: pnpm audit:prod
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:ai
      - run: pnpm eval:ai
      - run: pnpm eval:food-photo
      - run: pnpm exec prettier --check output/evals
      - run: git diff --exit-code -- output/evals
      - run: pnpm build
      - run: pnpm build:weapp
      - run: pnpm db:up
      - run: pnpm db:migrate
      - run: pnpm test:integration
      - run: pnpm ops:verify-backup-restore
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build:h5:oidc
      - run: pnpm test:e2e:oidc
      - name: Stop local dependencies
        if: always()
        run: docker compose -f infra/local/compose.yaml down --volumes --remove-orphans

  deployment-smoke:
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.13.0
      - run: pnpm deploy:smoke
